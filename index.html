<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GymOS — Gym Progress OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <meta name="description" content="Преміальна платформа для планування тренувань, трекінгу підходів, особистих рекордів, кардіо та командної статистики.">
    <meta name="theme-color" content="#08090a">

    <link rel="icon" href="favicon.ico" sizes="any">

    <!-- PWA: installable + offline shell -->
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GymOS">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar" aria-label="Головна навігація">
            <div class="brand-block">
                <div class="brand-mark">GO</div>
                <div class="brand-text">
                    <div class="brand-title">GymOS</div>
                    <div class="brand-caption">Gym Progress OS</div>
                </div>
                <button class="sidebar-collapse" id="sidebarCollapseButton" type="button" aria-label="Згорнути меню"><i data-lucide="panel-left-close"></i></button>
            </div>

            <nav class="sidebar-navigation" id="sidebarNavigation"></nav>

            <div class="sidebar-profile-card" id="sidebarProfileCard"></div>
        </aside>

        <main class="main-shell">
            <header class="topbar">
                <div>
                    <p class="eyebrow" id="sectionEyebrow">Панель</p>
                    <h1 id="sectionTitle">GymOS</h1>
                </div>

                <div class="topbar-actions">
                    <button class="button button-secondary compact" id="openQuickActionButton" type="button">
                        <i data-lucide="zap"></i>
                        Швидка дія
                    </button>
                    <button class="avatar-button" id="openUserSwitcherButton" type="button" aria-label="Профіль"></button>
                </div>
            </header>

            <section class="page-content" id="pageContent"></section>
        </main>

        <nav class="mobile-navigation" id="mobileNavigation" aria-label="Мобільна навігація"></nav>
    </div>

    <div class="modal-backdrop hidden" id="modalBackdrop"></div>
    <div class="modal-layer hidden" id="modalLayer" role="dialog" aria-modal="true"></div>
    <div class="drawer-layer hidden" id="drawerLayer" aria-live="polite"></div>
    <div class="toast-stack" id="toastStack" aria-live="polite"></div>

    <!-- Icons are needed on every render, so load them up front (pinned for stability).
         Chart.js and FullCalendar are heavy and section-specific — app.js injects them
         on demand only when the stats / calendar views open. date-fns was unused. -->
    <script src="https://cdn.jsdelivr.net/npm/lucide@1.21.0/dist/umd/lucide.js"></script>
    <script>
        window.FORGE_CONFIG = {
            appName: "GymOS",
            apiBaseUrl: "https://gym-os-back.vercel.app",
            dataMode: "api",
            allowLocalFallback: false,
            requireAuth: true
        };
    </script>
    <script type="module" src="/app.js"></script>
    <script>
        // PWA service worker — installable app + offline shell (network-first).
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/sw.js").catch(() => {});
            });
        }
    </script>
</body>
</html>
